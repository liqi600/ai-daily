name: 🤖 AI Daily Report

on:
  schedule:
    # 每天北京时间 8:00 (UTC+8 = UTC 0:00)
    - cron: "0 0 * * *"
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write # 允许自动推送

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Daily Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_daily.py

      - name: Commit & Push
        run: |
          git config user.name "ai-daily-bot[bot]"
          git config user.email "ai-daily-bot[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes, skipping commit."
          else
            git commit -m "📅 $(date +'%Y-%m-%d') AI 日报自动更新"
            git push
          fi
